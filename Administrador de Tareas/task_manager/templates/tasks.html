<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lista de Tareas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<h2>Lista de tareas</h2>
<form action="/add_task" method="POST">
    <input type="text" name="title" placeholder="Título de la tarea" required>
    <br><br>
    <textarea name="description" placeholder="Descripción"></textarea>
    <br><br>
    <button type="submit">Agregar tarea</button>
</form>
<hr>
{% for task in tasks %}
<div class="task">
    <p>
        <b>{{ task[1] }}</b><br>
        {{ task[2] }}
    </p>
    <a href="/edit_task/{{ task[0] }}"><button>✏️ Editar</button></a>
    <a href="/delete_task/{{ task[0] }}"><button>🗑 Eliminar</button></a>
</div>
<hr>
{% endfor %}
<br>
<a href="/dashboard"><button>Volver al Dashboard</button></a>
</body>
</html>
